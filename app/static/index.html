<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agentic AI App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 40px 16px; }
  .container { width: 100%; max-width: 640px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #111; }
  .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #e5e5e5; }
  label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
  button { width: 100%; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  button:hover { background: #4338ca; }
  button:disabled { background: #a5b4fc; cursor: not-allowed; }
  #messages { display: flex; flex-direction: column; gap: 10px; min-height: 200px; }
  .msg { padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; max-width: 88%; white-space: pre-wrap; word-break: break-word; }
  .msg.user { background: #4f46e5; color: white; align-self: flex-end; border-radius: 10px 10px 2px 10px; }
  .msg.agent { background: #f0f0f0; color: #111; align-self: flex-start; border-radius: 10px 10px 10px 2px; }
  .msg.error { background: #fee2e2; color: #991b1b; align-self: center; font-size: 12px; }
  .hint { color: #999; font-size: 13px; text-align: center; padding: 40px 0; }
  .row { display: flex; gap: 8px; }
  .row input { margin-bottom: 0; }
  .row button { width: auto; padding: 8px 20px; flex-shrink: 0; }
  #status { font-size: 12px; color: #666; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
</style>
</head>
<body>
<div class="container">
  <h1>Agentic AI App</h1>

  <div class="card" id="login-card">
    <label>Username</label>
    <input id="username" value="demo" />
    <label>Password</label>
    <input id="password" type="password" value="demo" />
    <button id="login-btn" onclick="login()">Login</button>
    <p id="login-error" style="color:#dc2626;font-size:12px;margin-top:8px;display:none;"></p>
  </div>

  <div class="card" id="chat-card" style="display:none;">
    <div id="status"><span class="dot"></span><span id="status-text">connected</span></div>
    <div id="messages"><div class="hint">Send a message to begin</div></div>
    <div style="margin-top:14px;" class="row">
      <input id="msg" placeholder="Type a message... (Enter to send)" onkeydown="if(event.key==='Enter')send()" />
      <button id="send-btn" onclick="send()" style="width:auto;">Send</button>
    </div>
  </div>
</div>

<script>
let token = null, sessionId = null;

async function login() {
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Logging in...';
  document.getElementById('login-error').style.display = 'none';
  try {
    const r = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    if (!r.ok) throw new Error((await r.json()).detail || 'Login failed');
    token = (await r.json()).access_token;
    document.getElementById('login-card').style.display = 'none';
    document.getElementById('chat-card').style.display = 'block';
    document.getElementById('msg').focus();
  } catch(e) {
    const el = document.getElementById('login-error');
    el.textContent = e.message; el.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Login';
  }
}

function addMsg(role, text) {
  const box = document.getElementById('messages');
  const hint = box.querySelector('.hint');
  if (hint) hint.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

async function send() {
  const input = document.getElementById('msg');
  const text = input.value.trim();
  if (!text || !token) return;
  input.value = '';
  document.getElementById('send-btn').disabled = true;
  addMsg('user', text);
  const thinking = addMsg('agent', '...');
  try {
    const payload = {message: text};
    if (sessionId) payload.session_id = sessionId;
    const r = await fetch('/api/v1/chat/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
      body: JSON.stringify(payload)
    });
    if (!r.ok) {
      thinking.className = 'msg error';
      thinking.textContent = r.status === 401 ? 'Session expired — refresh the page.' : 'Error ' + r.status;
      return;
    }
    const data = await r.json();
    thinking.textContent = data.content;
    if (data.session_id && !sessionId) sessionId = data.session_id;
  } catch(e) {
    thinking.className = 'msg error';
    thinking.textContent = 'Cannot reach server.';
  } finally {
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
